name: Deploy Portfolio to cPanel via FTP

on:
  push:
    branches:
      - main  # Triggers on every push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to OrangeHost cPanel via FTP

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          server-dir: /portfolio/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/venv/**
            **/.venv/**
            **/__pycache__/**
